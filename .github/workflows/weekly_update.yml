name: Weekly Data Update

# Runs every Sunday at 06:00 UTC during the tournament (Jun–Aug 2026)
# Also runs on every push to main (to re-generate JSON after manual data edits)
# Can be triggered manually from the Actions tab

on:
  schedule:
    - cron: '0 6 * * 0'   # every Sunday 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'data/manual/**'
      - 'pipeline/**'
      - 'run_pipeline.py'
  workflow_dispatch:
    inputs:
      export_only:
        description: 'Skip fetch/clean, only regenerate JSON'
        required: false
        default: 'false'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # allow committing updated site/data/*.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          if [ "${{ github.event.inputs.export_only }}" = "true" ]; then
            python run_pipeline.py --export-only
          else
            python run_pipeline.py
          fi
        env:
          # Optional Socrata app token for higher rate limits (add in repo Secrets)
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}

      - name: Check for changes to site/data
        id: diff
        run: |
          git diff --quiet site/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/data/
          git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No data changes this run."

