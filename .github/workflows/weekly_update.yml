name: Weekly Data Update

on:
  schedule:
    - cron: '0 6 * * 0'   # every Sunday 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'data/manual/**'
      - 'pipeline/**'
      - 'run_pipeline.py'
  workflow_dispatch:
    inputs:
      export_only:
        description: 'Skip fetch/clean, only regenerate JSON'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          if [ "${{ github.event.inputs.export_only }}" = "true" ]; then
            python run_pipeline.py --export-only
          else
            python run_pipeline.py
          fi
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}

      - name: Check for changes
        id: diff
        run: git diff --quiet site/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data to worldcup repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/data/
          git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.diff.outputs.changed != 'true'
        run: echo "No data changes this run."

  sync-website:
    needs: update
    runs-on: ubuntu-latest
    if: always() && needs.update.result != 'failure'

    steps:
      - name: Checkout worldcup repo
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: dmehndiratta/Website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Copy updated JSON to website
        run: cp site/data/*.json website/public/worldcup-transit/data/

      - name: Commit and push to website repo
        run: |
          cd website
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/worldcup-transit/data/
          git diff --staged --quiet || git commit -m "data: worldcup transit refresh $(date -u +%Y-%m-%d)"
          git push
